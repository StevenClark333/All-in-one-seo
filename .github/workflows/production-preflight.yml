name: Production Preflight

on:
  workflow_dispatch:

jobs:
  preflight:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_SCRIPT_URL: ${{ vars.NEXT_PUBLIC_SCRIPT_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      INTEGRATION_ENCRYPTION_KEY: ${{ secrets.INTEGRATION_ENCRYPTION_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      AI_MODEL: ${{ vars.AI_MODEL }}
      AI_MONTHLY_QUOTA: ${{ vars.AI_MONTHLY_QUOTA }}
      ERROR_REPORTING_WEBHOOK_URL: ${{ secrets.ERROR_REPORTING_WEBHOOK_URL }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      ALERT_FROM_EMAIL: ${{ vars.ALERT_FROM_EMAIL }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      SHOPIFY_API_KEY: ${{ secrets.SHOPIFY_API_KEY }}
      SHOPIFY_API_SECRET: ${{ secrets.SHOPIFY_API_SECRET }}
      SHOPIFY_SCOPES: ${{ vars.SHOPIFY_SCOPES }}
      WEBFLOW_CLIENT_ID: ${{ secrets.WEBFLOW_CLIENT_ID }}
      WEBFLOW_CLIENT_SECRET: ${{ secrets.WEBFLOW_CLIENT_SECRET }}
      WEBFLOW_SCOPES: ${{ vars.WEBFLOW_SCOPES }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_PRICE_STARTER: ${{ vars.STRIPE_PRICE_STARTER }}
      STRIPE_PRICE_GROWTH: ${{ vars.STRIPE_PRICE_GROWTH }}
      STRIPE_PRICE_AGENCY: ${{ vars.STRIPE_PRICE_AGENCY }}
      STRIPE_PRICE_AGENCY_PRO: ${{ vars.STRIPE_PRICE_AGENCY_PRO }}
      HTML_SNAPSHOT_RETENTION_DAYS: ${{ vars.HTML_SNAPSHOT_RETENTION_DAYS }}
      SLOW_QUERY_THRESHOLD_MS: ${{ vars.SLOW_QUERY_THRESHOLD_MS }}
      SMOKE_TEST_TARGET_URL: ${{ vars.SMOKE_TEST_TARGET_URL || vars.NEXT_PUBLIC_APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate production environment
        run: npm run validate:production-env

      - name: Check migration status
        run: npx prisma migrate status

      - name: Build
        run: npm run build

      - name: Smoke test configured app URL
        run: npm run smoke:test

      - name: Security audit
        run: npm run security:audit
