services:
  postgres:
    image: postgres:16-alpine
    container_name: all-in-one-seo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: all_in_one_seo
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d all_in_one_seo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
