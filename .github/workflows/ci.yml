name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: all_in_one_seo
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d all_in_one_seo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:55432/all_in_one_seo?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Migrate database
        run: npx prisma migrate deploy

      - name: Verify
        run: npm run check

      - name: Vulnerability audit
        run: npm run security:audit
